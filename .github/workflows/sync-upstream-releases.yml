name: 同步上游发布插件

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      force_sync:
        description: '强制同步'
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      defaults: ${{ steps.set-matrix.outputs.defaults }}
    steps:
      - uses: actions/checkout@v4
      
      - name: 读取同步配置
        id: set-matrix
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          
          defaults=$(yq eval '.defaults' config/sync-config.yaml -o=json -I=0)
          echo "defaults=$defaults" >> $GITHUB_OUTPUT
          
          matrix=$(yq eval '.repositories' config/sync-config.yaml -o=json -I=0)
          echo "matrix={\"include\":$matrix}" >> $GITHUB_OUTPUT
          
          echo "📋 读取到 $(echo $matrix | jq '. | length') 个仓库配置"
  sync:
    needs: prepare
    name: ${{ matrix.github_repo }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      fail-fast: false
      max-parallel: 3
      
    steps:
      - uses: actions/checkout@v4
      
      - name: 检查更新
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          local_name="${{ matrix.local_name || matrix.github_repo }}"
          repo="${{ matrix.github_owner }}/${{ matrix.github_repo }}"
          
          tag=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$repo/tags?per_page=1" | jq -r '.[0].name // empty')
          
          if [ -z "$tag" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ "${{ matrix.prerelease }}" = "true" ]; then
            release=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$repo/releases?per_page=1" | jq '.[0]')
            tag=$(echo "$release" | jq -r '.tag_name')
          else
            release=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$repo/releases/tags/$tag")
          if ! echo "$release" | jq -e '.assets[0]' >/dev/null 2>&1; then
            release=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$repo/releases/latest")
            tag=$(echo "$release" | jq -r '.tag_name')
          fi
          fi
          
          [ $(echo "$release" | jq '.assets | length') -eq 0 ] && exit 0
          
          echo "$release" > /tmp/release.json
          [[ "$tag" =~ ^v ]] && version="$tag" || version="v$tag"
          
          local=$(bash .github/workflows/scripts/version-manager.sh read "$local_name" 2>/dev/null || echo "")
          
          if [ -z "$local" ] || [ "$local" != "$version" ] || [ "${{ inputs.force_sync }}" = "true" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "✅ $local_name: ${local:-新建} → $version"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "ℹ️  $local_name: 已是最新 ($version)"
          fi
          
          echo "local_name=$local_name" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "local_version=${local:-新建}" >> $GITHUB_OUTPUT
      
      - name: 过滤并下载文件
        id: download
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          VERSION_NO_V="${VERSION#v}"
          DOWNLOAD_DIR="${{ runner.temp }}/downloads"
          mkdir -p "$DOWNLOAD_DIR"
          
          # 过滤文件列表
          all_files=$(jq -r '.assets[] | "\(.browser_download_url)|\(.name)"' /tmp/release.json)
          filtered_files=""
          
          if [ -n "${{ matrix.filter_include }}" ]; then
            declare -A count limit
            for rule in ${{ matrix.filter_include }}; do
              pattern="${rule%:*}"
              pattern="${pattern//\{VERSION\}/$VERSION_NO_V}"
              lim="${rule##*:}"
              [ "$lim" = "$rule" ] && lim=999
              limit["$pattern"]=$lim
              count["$pattern"]=0
            done
            
            while IFS='|' read -r url filename; do
              [ -z "$url" ] && continue
              for pattern in "${!limit[@]}"; do
                if [[ "$filename" == $pattern ]]; then
                  if [ ${count["$pattern"]} -lt ${limit["$pattern"]} ]; then
                    filtered_files+="$url|$filename"$'\n'
                    count["$pattern"]=$((${count["$pattern"]} + 1))
                    break
                  fi
                fi
              done
            done <<< "$all_files"
            
          elif [ -n "${{ matrix.filter_exclude }}" ]; then
            while IFS='|' read -r url filename; do
              [ -z "$url" ] && continue
              excluded=false
              for pattern in ${{ matrix.filter_exclude }}; do
                [[ "$filename" == $pattern ]] && excluded=true && break
              done
              [ "$excluded" = false ] && filtered_files+="$url|$filename"$'\n'
            done <<< "$all_files"
          else
            filtered_files="$all_files"
          fi
          
          if [ "${{ matrix.filter_by_version }}" = "true" ]; then
            temp=""
            while IFS='|' read -r url filename; do
              [ -z "$url" ] && continue
              [[ "$filename" == *"$VERSION_NO_V"* ]] && temp+="$url|$filename"$'\n'
            done <<< "$filtered_files"
            filtered_files="$temp"
          fi
          
          file_count=$(echo "$filtered_files" | grep -c '|' || echo 0)
          echo "📦 过滤: $(jq '.assets|length' /tmp/release.json) → $file_count 个文件"
          
          [ $file_count -eq 0 ] && exit 0
          
          # 下载文件
          downloaded=0
          while IFS='|' read -r url filename; do
            [ -z "$url" ] && continue
            curl -fsSL "$url" -o "$DOWNLOAD_DIR/$filename" && echo "  ✓ $filename" && downloaded=$((downloaded + 1))
          done <<< "$filtered_files"
          
          echo "✅ 下载: $downloaded 个文件"
          echo "DOWNLOAD_DIR=$DOWNLOAD_DIR" >> $GITHUB_ENV
          
      - name: 并行发布
        id: release
        if: steps.check.outputs.needs_update == 'true'
        env:
          PLATFORMS: ${{ matrix.platforms || fromJSON(needs.prepare.outputs.defaults).platforms }}
          USERNAME: ${{ matrix.username || fromJSON(needs.prepare.outputs.defaults).username }}
          R2_PUBLIC_URL: ${{ matrix.r2_public_url || fromJSON(needs.prepare.outputs.defaults).R2_PUBLIC_URL }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          REPO_NAME: ${{ steps.check.outputs.local_name }}
          TAG_NAME: ${{ steps.check.outputs.version }}
          DOWNLOAD_DIR: ${{ env.DOWNLOAD_DIR }}
          GITHUB_REPO_URL: "https://github.com/${{ matrix.github_owner }}/${{ matrix.github_repo }}"
        run: bash .github/workflows/scripts/release.sh
      
      - name: 保存版本信息
        if: steps.check.outputs.needs_update == 'true' && steps.release.outcome == 'success'
        run: |
          mkdir -p /tmp/version
          echo "${{ steps.check.outputs.local_name }}|${{ steps.check.outputs.version }}" > /tmp/version/update.txt
      
      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.needs_update == 'true' && steps.release.outcome == 'success'
        with:
          name: version-${{ matrix.github_repo }}
          path: /tmp/version/update.txt
          retention-days: 1
      
      - name: 生成状态
        if: always()
        run: |
          mkdir -p /tmp/status
          if [ "${{ steps.check.outputs.needs_update }}" != "true" ]; then
            status="✅ 无需更新"
          elif [ "${{ steps.release.outcome }}" = "success" ]; then
            status="✅ 已发布"
          else
            status="❌ 失败"
          fi
          
          cat > "/tmp/status/${{ matrix.github_repo }}.txt" <<EOF
          ${{ matrix.github_repo }}
          ${{ steps.check.outputs.local_name }}
          ${{ steps.check.outputs.version }}
          ${{ steps.check.outputs.local_version }}
          $status
          EOF
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: status-${{ matrix.github_repo }}
          path: /tmp/status/${{ matrix.github_repo }}.txt
          retention-days: 1

  summary:
    needs: sync
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: version-*
          path: /tmp/versions
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: status-*
          path: /tmp/status
      
      - name: 更新版本记录
        run: |
          updated=0
          for file in /tmp/versions/version-*/update.txt; do
            [ -f "$file" ] || continue
            IFS='|' read -r name version < "$file"
            [ -n "$name" ] && [ -n "$version" ] && {
              bash .github/workflows/scripts/version-manager.sh write "$name" "$version"
              echo "  ✓ $name → $version"
              updated=$((updated + 1))
            }
          done
          [ $updated -gt 0 ] && echo "need_push=true" >> $GITHUB_ENV || true
      
      - name: 推送版本记录
        if: env.need_push == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/version.txt
          git diff --cached --quiet || {
            git commit -m "📝 批量更新版本记录"
            git pull --rebase || true
            git push
          }
      
      - name: 生成报告
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          # 📋 上游同步报告
          
          | 上游项目 | 仓库名称 | 上游版本 | 本地版本 | 状态 |
          |---------|---------|---------|---------|------|
          EOF
          
          total=0 updated=0 skipped=0 failed=0
          for file in /tmp/status/status-*/*.txt; do
            [ -f "$file" ] || continue
            repo=$(sed -n '1p' "$file")
            local=$(sed -n '2p' "$file")
            upstream=$(sed -n '3p' "$file")
            local_ver=$(sed -n '4p' "$file")
            status=$(sed -n '5p' "$file")
            
            echo "| $repo | $local | $upstream | $local_ver | $status |" >> $GITHUB_STEP_SUMMARY
            total=$((total + 1))
            [[ "$status" == *"已发布"* ]] && updated=$((updated + 1))
            [[ "$status" == *"无需更新"* ]] && skipped=$((skipped + 1))
            [[ "$status" == *"失败"* ]] && failed=$((failed + 1))
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**统计:** 总计 $total | 已发布 $updated | 无需更新 $skipped | 失败 $failed" >> $GITHUB_STEP_SUMMARY
      
