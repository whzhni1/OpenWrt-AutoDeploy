name: 构建 VNT / VNTS

on:
  #schedule:
  #  - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制重新构建'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      has_updates: ${{ steps.check.outputs.has_updates }}
      defaults: ${{ steps.check.outputs.defaults }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          wget -qO /tmp/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && chmod +x /tmp/yq
          echo "defaults=$(/tmp/yq '.defaults' config/sync-config.yaml -o=json -I=0)" >> $GITHUB_OUTPUT
          UPDATES='[]'
          for name in vnt vnts; do
            ver=$(curl -s "https://api.github.com/repos/vnt-dev/$name/releases/latest" | jq -r '.tag_name|ltrimstr("v")')
            [ -z "$ver" ] && continue
            local=$(bash .github/workflows/scripts/version-manager.sh read "$name" 2>/dev/null || echo "")
            if [ "$local" != "$ver" ] || [ "${{ inputs.force_build }}" = "true" ]; then
              # 仅在 name 为 vnt 时启用 luci 构建标识
              UPDATES=$(echo "$UPDATES" | jq -c --arg n "$name" --arg v "$ver" '. += [{name:$n,version:$v,luci:($n=="vnt")}]')
            fi
          done
          [ "$UPDATES" = "[]" ] && echo "has_updates=false" >> $GITHUB_OUTPUT || echo "has_updates=true" >> $GITHUB_OUTPUT
          echo "matrix={\"include\":$UPDATES}" >> $GITHUB_OUTPUT

  build:
    needs: check
    if: needs.check.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check.outputs.matrix) }}
    steps:
      - name: 构建 ${{ matrix.name }}
        run: |
          set -e
          NAME="${{ matrix.name }}"
          VER="${{ matrix.version }}"
          mkdir -p out

          # -----------------------------------------------------------
          # 第一部分：下载 VNT/VNTS 官方压缩包
          # -----------------------------------------------------------
          API_URL="https://api.github.com/repos/vnt-dev/$NAME/releases/latest"
          ASSETS=$(curl -s "$API_URL" | jq -r '.assets[] | @base64')
          
          for asset_enc in $ASSETS; do
            asset=$(echo "$asset_enc" | base64 -d)
            filename=$(echo "$asset" | jq -r '.name')
            download_url=$(echo "$asset" | jq -r '.browser_download_url')
            
            # 筛选压缩包，排除源码
            if [[ "$filename" == *.tar.gz ]] || [[ "$filename" == *.zip ]]; then
              if [[ "$filename" != *"source"* ]]; then
                 echo "📥 正在下载: $filename"
                 wget -q "$download_url" -O "out/$filename"
                 echo " ✅ 已保存到 out/$filename"
              fi
            fi
          done

          # -----------------------------------------------------------
          # 第二部分：构建 LuCI (仅当 matrix.luci 为 true 时执行)
          # -----------------------------------------------------------
          if [ "${{ matrix.luci }}" = "true" ]; then
            echo "📦 开始构建 luci-app-vnt"
            git clone --depth=1 https://github.com/lmq8267/luci-app-vnt src
            luci_ver=$(grep -oP 'PKG_VERSION:=\K.*' src/luci-app-vnt/Makefile | head -1)
            
            rm -rf pkg && mkdir -p pkg/CONTROL
            
            # 拷贝 LuCI 文件
            [ -d src/luci-app-vnt/luasrc ] && mkdir -p pkg/usr/lib/lua/luci && cp -R src/luci-app-vnt/luasrc/* pkg/usr/lib/lua/luci/
            [ -d src/luci-app-vnt/htdocs ] && mkdir -p pkg/www && cp -R src/luci-app-vnt/htdocs/* pkg/www/
            [ -d src/luci-app-vnt/root ] && cp -R src/luci-app-vnt/root/* pkg/
            find pkg/etc/init.d -type f -exec chmod +x {} \; 2>/dev/null || true
            
            size=$(du -sb pkg | cut -f1)
            
            # 定义脚本内容
            POSTINST='#!/bin/sh
            rm -rf /tmp/luci-*
            [ -f /etc/uci-defaults/luci-vnt ] && sh /etc/uci-defaults/luci-vnt && rm -f /etc/uci-defaults/luci-vnt
            [ -x /etc/init.d/vnt ] && /etc/init.d/vnt enable
            ( sleep 2 && /etc/init.d/vnt restart && /etc/init.d/uhttpd restart 2>/dev/null || /etc/init.d/nginx restart 2>/dev/null ) &
            exit 0'
            
             PRERM='#!/bin/sh
              [ "$PKG_UPGRADE" = "1" ] || exit 0
              /etc/init.d/vnt stop 2>/dev/null || true
             exit 0'
            
            # 生成 IPK 包
            printf 'Package: luci-app-vnt\nVersion: %s\nArchitecture: all\nInstalled-Size: %s\nDepends: vnt\nDescription: LuCI support for VNT\n' \
              "$luci_ver" "$size" > pkg/CONTROL/control
            echo "/etc/config/vnt" > pkg/CONTROL/conffiles
            echo "$POSTINST" > pkg/CONTROL/postinst && chmod +x pkg/CONTROL/postinst
            echo "$PRERM" > pkg/CONTROL/prerm && chmod +x pkg/CONTROL/prerm
            
            echo '2.0' > debian-binary
            tar --format=gnu --numeric-owner --group=0 --owner=0 -czf control.tar.gz -C pkg/CONTROL .
            data_dirs=$(find pkg -maxdepth 1 -type d ! -name CONTROL ! -name pkg -printf './%f ')
            tar --format=gnu --numeric-owner --group=0 --owner=0 -czf data.tar.gz -C pkg $data_dirs
            tar --format=gnu --numeric-owner --group=0 --owner=0 -czf "out/luci-app-vnt_${luci_ver}_all.ipk" ./control.tar.gz ./data.tar.gz ./debian-binary
            
            # 生成 APK 包 (用于新版 OpenWrt)
            rm -rf pkg/CONTROL
            printf 'pkgname = luci-app-vnt\npkgver = %s\npkgdesc = LuCI support for VNT\narch = all\nsize = %s\ndepend = vnt\n' \
              "$luci_ver" "$size" > pkg/.PKGINFO
            echo "$POSTINST" > pkg/.post-install && chmod +x pkg/.post-install
            echo "$PRERM" > pkg/.pre-deinstall && chmod +x pkg/.pre-deinstall
            tar -czf "out/luci-app-vnt-${luci_ver}.all.apk" -C pkg .
            
            # 清理临时文件
            rm -rf src pkg control.tar.gz data.tar.gz debian-binary
            echo " ✅ luci-app-vnt 构建完成"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: out/*
          retention-days: 3

  release:
    needs: [check, build]
    if: needs.check.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: files
      - name: 发布
        env:
          USERNAME: ${{ fromJSON(needs.check.outputs.defaults).username }}
          PLATFORMS: ${{ fromJSON(needs.check.outputs.defaults).platforms }}
          R2_PUBLIC_URL: ${{ fromJSON(needs.check.outputs.defaults).R2_PUBLIC_URL }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          REPO_NAME: ${{ matrix.name }}
          TAG_NAME: ${{ matrix.version }}
          DOWNLOAD_DIR: files
          GITHUB_REPO_URL: https://github.com/vnt-dev/${{ matrix.name }}
        run: |
          export UPLOAD_FILES="$(find files -type f | tr '\n' ' ')"
          export RELEASE_BODY="## 📦 ${{ matrix.name }} ${{ matrix.version }}"
          bash .github/workflows/scripts/release.sh
      - name: 更新版本
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bash .github/workflows/scripts/version-manager.sh write "${{ matrix.name }}" "${{ matrix.version }}"
          git add config/version.txt
          git diff --cached --quiet || git commit -m "更新 ${{ matrix.name }} → ${{ matrix.version }}"
          git push || git pull --rebase && git push
